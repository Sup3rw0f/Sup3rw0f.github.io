name: Check static site

on:
  pull_request:
  push:
    branches:
      - Branch_Prof_001

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run site checks
        run: npm run check
